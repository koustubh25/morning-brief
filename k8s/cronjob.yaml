apiVersion: v1
kind: Namespace
metadata:
  name: morning-brief
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: morning-brief
  namespace: morning-brief
spec:
  schedule: "0 21 * * *"   # 21:00 UTC daily = 07:00 AEST
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: morning-brief
              image: 172.30.29.3:30500/morning-brief:latest
              imagePullPolicy: Always
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: morning-brief-secrets
                      key: ANTHROPIC_API_KEY
                - name: HOME
                  value: "/home/appuser"
                - name: GIT_AUTHOR_NAME
                  value: "morning-brief"
                - name: GIT_AUTHOR_EMAIL
                  value: "morning-brief@koustubh25"
                - name: GIT_COMMITTER_NAME
                  value: "morning-brief"
                - name: GIT_COMMITTER_EMAIL
                  value: "morning-brief@koustubh25"
              volumeMounts:
                - name: config
                  mountPath: /app/config
                - name: ssh-secret
                  mountPath: /ssh-secret
                  readOnly: true
              resources:
                requests: { cpu: 100m, memory: 128Mi }
                limits:   { cpu: 500m, memory: 512Mi }
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: config
              configMap:
                name: morning-brief-config
            - name: ssh-secret
              secret:
                secretName: morning-brief-secrets
                defaultMode: 0444
                items:
                  - key: SSH_PRIVATE_KEY
                    path: id_ed25519
