rss:
  # GCP & Google products (technical core)
  - name: Google Cloud Blog
    url: https://cloudblog.withgoogle.com/rss/
    weight: high
  - name: Google Cloud Security Blog
    url: https://cloudblog.withgoogle.com/products/identity-security/rss/
    weight: high
  - name: Google Workspace Updates
    url: https://workspaceupdates.googleblog.com/feeds/posts/default
    weight: high

  # Technical practitioner sources
  - name: InfoQ Cloud
    url: https://feed.infoq.com/cloud
    weight: medium
  - name: The New Stack
    url: https://thenewstack.io/feed/
    weight: low

  # Business / strategy (20% slice)
  - name: InnovationAus
    url: https://www.innovationaus.com/feed/
    weight: medium
  - name: HBR
    url: https://feeds2.feedburner.com/harvardbusiness
    weight: medium

hacker_news:
  enabled: true
  min_score: 100
  max_items: 30

google_news:
  queries:
    # GCP & Google products (technical — 60%)
    - "Gemini Google Workspace enterprise deployment 2026"
    - "Google SecOps Chronicle SIEM security operations"
    - "Google Cloud migration AI-assisted modernisation"
    - "Vertex AI Gemini production enterprise 2026"
    - "GCP architecture best practices implementation"
    - "Google Cloud Next announcement 2026"
    # Deep AI — frontier models and tooling (20%, high weight so they enter scoring pool)
    - query: "Anthropic Claude model release feature 2026"
      weight: high
    - query: "OpenAI GPT model release API feature 2026"
      weight: high
    - query: "AI model reasoning agents frontier research 2026"
      weight: high
    # Australian business context (strategic — 20%)
    - "PwC Google Cloud Australia consulting"
    - "AI strategy enterprise Australia 2026"
