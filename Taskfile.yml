version: "3"

vars:
  REGISTRY: 172.30.29.3:30500
  IMAGE: "{{.REGISTRY}}/morning-brief"
  NAMESPACE: morning-brief

tasks:

  # ── Local dev ──────────────────────────────────────────────────────────────

  run:
    desc: "Generate today's brief (dry run — no git push)"
    cmd: .venv/bin/python main.py --dry-run

  run:push:
    desc: "Generate today's brief and push to GitHub"
    cmd: .venv/bin/python main.py

  converse:
    desc: "Start voice debate partner on today's brief"
    cmd: .venv/bin/python converse.py

  # ── Docker ─────────────────────────────────────────────────────────────────

  build:
    desc: "Build Docker image"
    cmd: docker build --platform linux/amd64 -t {{.IMAGE}}:latest .

  push:
    desc: "Push image to homelab registry"
    cmd: docker push {{.IMAGE}}:latest

  build:push:
    desc: "Build and push image"
    deps: [build]
    cmd: docker push {{.IMAGE}}:latest

  # ── Secrets ────────────────────────────────────────────────────────────────

  secret:create:
    desc: "Create k8s Secret (reads CLAUDE_CODE_OAUTH_TOKEN from macOS Keychain)"
    vars:
      OAUTH_TOKEN:
        sh: security find-generic-password -s "Claude Code-credentials" -w | python3 -c "import json,sys; print(json.load(sys.stdin)['claudeAiOauth']['accessToken'])"
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - |
        kubectl create secret generic morning-brief-secrets \
          --namespace {{.NAMESPACE}} \
          --from-literal=CLAUDE_CODE_OAUTH_TOKEN={{.OAUTH_TOKEN}} \
          --from-file=SSH_PRIVATE_KEY={{.HOME}}/.ssh/id_morning_brief \
          --dry-run=client -o yaml | kubectl apply -f -
      - echo "Secret applied."

  secret:rotate:
    desc: "Refresh OAuth token in k8s Secret (run when claude stops working in pod)"
    vars:
      OAUTH_TOKEN:
        sh: security find-generic-password -s "Claude Code-credentials" -w | python3 -c "import json,sys; print(json.load(sys.stdin)['claudeAiOauth']['accessToken'])"
    cmds:
      - |
        kubectl patch secret morning-brief-secrets \
          --namespace {{.NAMESPACE}} \
          --type=json \
          -p="[{\"op\":\"replace\",\"path\":\"/data/CLAUDE_CODE_OAUTH_TOKEN\",\"value\":\"$(echo -n {{.OAUTH_TOKEN}} | base64)\"}]"
      - echo "Token rotated."

  # ── k8s deploy ─────────────────────────────────────────────────────────────

  deploy:config:
    desc: "Apply ConfigMap (sources + topics)"
    cmd: kubectl apply -f k8s/configmap.yaml

  deploy:cronjob:
    desc: "Apply CronJob"
    cmd: kubectl apply -f k8s/cronjob.yaml

  deploy:
    desc: "Full deploy — secrets + config + cronjob"
    cmds:
      - task: secret:create
      - task: deploy:config
      - task: deploy:cronjob

  # ── Operations ─────────────────────────────────────────────────────────────

  trigger:
    desc: "Manually trigger a job run now"
    cmd: |
      kubectl create job morning-brief-manual-$(date +%s) \
        --from=cronjob/morning-brief \
        --namespace {{.NAMESPACE}}

  logs:
    desc: "Tail logs from the most recent job pod"
    cmd: |
      POD=$(kubectl get pods -n {{.NAMESPACE}} \
        --sort-by=.metadata.creationTimestamp \
        -o jsonpath='{.items[-1].metadata.name}')
      kubectl logs -n {{.NAMESPACE}} $POD --follow

  status:
    desc: "Show CronJob and recent job status"
    cmds:
      - kubectl get cronjob -n {{.NAMESPACE}}
      - kubectl get jobs -n {{.NAMESPACE}} --sort-by=.metadata.creationTimestamp
      - kubectl get pods -n {{.NAMESPACE}} --sort-by=.metadata.creationTimestamp
