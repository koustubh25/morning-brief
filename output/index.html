<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Morning Brief — Mon 16 Mar 2026</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --tag-cloud: #1e40af;
      --tag-infra: #065f46;
      --tag-ai: #581c87;
      --tag-aus: #7c2d12;
      --tag-news: #374151;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    /* ── Header ── */
    header {
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .brief-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .brief-meta {
      display: flex;
      gap: 1rem;
      margin-top: 0.3rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* ── Source group ── */
    .source-group {
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      margin-bottom: 1rem;
      background: var(--surface);
    }
    .source-group > summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      font-weight: 700;
      font-size: 0.95rem;
      user-select: none;
      border-radius: 8px 8px 0 0;
      color: #fff;
    }
    .source-group > summary::-webkit-details-marker { display: none; }
    .source-group > summary::after {
      content: '\25BE';
      margin-left: auto;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .source-group:not([open]) > summary::after {
      transform: rotate(-90deg);
    }
    .source-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .article-count {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
    }
    .source-group-body {
      padding: 0 1rem 0.75rem;
    }

    /* ── Item card ── */
    .item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .item:last-child { border-bottom: none; }

    .item-headline {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.35rem;
    }
    .item-headline a {
      color: var(--text);
      text-decoration: none;
    }
    .item-headline a:hover { color: var(--accent); }

    .one-liner {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      line-height: 1.5;
    }
    .item-footer {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .score-pill {
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.6;
    }
    .reason {
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.7;
      font-style: italic;
    }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="brief-title">☁ Morning Brief</div>
    <div class="brief-meta">

      <span>·</span>

    </div>
  </header>

        Hacker News

      <div class="source-group-body">

        </article>
        
      </div>
    </details>
    
    <details class="source-group" style="border-left-color: #4285F4; background: linear-gradient(90deg, rgba(66, 133, 244, 0.05), var(--surface));">
      <summary style="background: rgba(66, 133, 244, 0.35);">
        <span class="source-dot" style="background: #4285F4; box-shadow: 0 0 6px rgba(66, 133, 244, 0.5);"></span>
        Google Cloud Blog
        <span class="article-count">1 article</span>
      </summary>
      <div class="source-group-body">
        
        <article class="item">
          <h2 class="item-headline">

        </article>
        
      </div>
    </details>
    
    <details class="source-group" style="border-left-color: #bb41d6; background: linear-gradient(90deg, rgba(187, 65, 214, 0.05), var(--surface));">
      <summary style="background: rgba(187, 65, 214, 0.35);">
        <span class="source-dot" style="background: #bb41d6; box-shadow: 0 0 6px rgba(187, 65, 214, 0.5);"></span>
        Some New Source

      </summary>
      <div class="source-group-body">
        
        <article class="item">

            <a href="https://example.com/3" target="_blank" rel="noopener">Test 3</a>
          </h2>

          <div class="item-footer">

            <span class="score-pill">7/10</span>

        </article>
        
      </div>
    </details>
    
  </main>

  <footer>
    <p>Generated 05:34 UTC · <a href="https://github.com/koustubhg/morning-brief">morning-brief</a></p>
  </footer>
</body>
</html>
